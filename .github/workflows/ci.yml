name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    # Les tags aussi : sans eux, rien ne vérifiait qu'un commit tagué était vert.
    # `release.yml` publie de son côté et n'attend pas ce job — les deux partent en
    # parallèle. Ce qu'on gagne, c'est qu'un échec soit visible sur le bon commit,
    # au lieu de ne jamais être mesuré.
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Package and Dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run Ruff
        run: |
          ruff check src tests scripts

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv Cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install Package and Dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run Tests
        run: |
          python -m pytest -v
