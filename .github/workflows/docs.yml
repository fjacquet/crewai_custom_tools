name: Deploy Documentation

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv Cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-docs-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-docs-

      - name: Install Dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Build Documentation Site
        run: |
          # --strict : un fichier ajouté sous docs/ mais absent de la nav de mkdocs.yml
          # devient une erreur, pas un avertissement. C'est ainsi que les deux documents
          # de juillet ont pu rester invisibles du site sans que rien ne le signale.
          mkdocs build --strict

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload the compiled site/ directory
          path: 'site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
